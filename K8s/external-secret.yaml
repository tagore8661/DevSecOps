apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: payments
spec:
  refreshInterval: 1h  # Sync every hour
  secretStoreRef:
    name: vault-store
    kind: SecretStore
  target:
    name: db-secret  # Kubernetes secret to create
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: payments/db
      property: username
  - secretKey: password
    remoteRef:
      key: payments/db
      property: password